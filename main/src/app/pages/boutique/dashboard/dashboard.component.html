<div class="dashboard-container">
  <app-sidebar></app-sidebar>
  
  <div class="main-content">
    <app-boutique-navbar></app-boutique-navbar>
    <div class="content-wrapper">
      <!-- En-tête Dashboard supprimé -->

      <!-- Stats Cards Grid -->
      <div class="stats-grid">
        <app-stat-card 
          *ngFor="let stat of stats"
          [icon]="stat.icon"
          [iconColor]="stat.iconColor"
          [label]="stat.label"
          [value]="stat.value"
          [change]="stat.change"
          [changeType]="stat.changeType"
          [changeIcon]="stat.changeIcon"
          [actionLabel]="stat.actionLabel"
          [actionColor]="stat.actionColor">
        </app-stat-card>
      </div>

      <!-- Statistiques graphiques sous les cards -->
      <div class="dashboard-stats-graphs statistiques-page">
        <div class="statistiques-graphiques">
          <div class="graphiques-row">
            <div class="graphe-container"><app-top-produits></app-top-produits></div>
            <div class="graphe-container"><app-ventes-par-jour></app-ventes-par-jour></div>
          </div>
          <div class="graphiques-row">
            <div class="graphe-container graphe-seul"><app-top-clients></app-top-clients></div>
          </div>
        </div>
      </div>
    </div>
    
    <app-footer></app-footer>
  </div>
</div>
