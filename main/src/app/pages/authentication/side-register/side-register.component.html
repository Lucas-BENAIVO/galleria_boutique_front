<div class="auth-container">
  <!-- Left Panel - Testimonial -->
  <div class="auth-right" style="background-image: url('/assets/images/backgrounds/free.jpg'); background-size: cover; background-position: center 70%; background-repeat: no-repeat; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
    <div class="testimonial-content">
      <div class="testimonial-stars">★★★★★</div>
      
      <p class="testimonial-quote">
        "Gérez votre boutique en ligne avec des outils puissants et intuitifs."
      </p>
      
      <div class="testimonial-author">Espace Boutique</div>
      <div class="testimonial-position">Panel de gestion ShoppingMall</div>
    </div>
  </div>

  <!-- Right Panel - Form -->
  <div class="auth-left">
    <div class="auth-title">Créer ma boutique</div>
    <div class="auth-subtitle">Inscrivez-vous en tant qu'administrateur de boutique.</div>

    <form (ngSubmit)="submit()">
      <div *ngIf="errorMessage" class="error-message" style="background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message" style="background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 16px;">
        {{ successMessage }}
      </div>

      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input type="text" class="form-input" placeholder="Entrez votre nom" [(ngModel)]="fullName" name="fullName" required />
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="Entrez votre email" [(ngModel)]="email" name="email" required />
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" placeholder="••••••••" [(ngModel)]="password" name="password" required />
      </div>

      <button type="submit" class="btn-signup" [disabled]="isLoading">
        {{ isLoading ? 'Inscription...' : 'Créer ma boutique' }}
      </button>

      <div class="signin-link">
        Vous avez déjà un compte ?<a [routerLink]="['/authentication/login']">Connectez-vous</a>
      </div>
    </form>
  </div>
</div>
