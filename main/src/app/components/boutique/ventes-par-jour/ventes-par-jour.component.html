<div class="ventes-par-jour-card">
  <div class="ventes-par-jour-header">
    <h3>Ventes par jour</h3>
    <div class="ventes-par-jour-filtres">
      <label for="mois-ventes">Mois :</label>
      <select id="mois-ventes" [value]="selectedMonth" (change)="onMonthChange($event)">
        <option>Janvier</option>
        <option>Février</option>
        <option>Mars</option>
        <option>Avril</option>
        <option>Mai</option>
        <option>Juin</option>
        <option>Juillet</option>
        <option>Août</option>
        <option>Septembre</option>
        <option>Octobre</option>
        <option>Novembre</option>
        <option>Décembre</option>
      </select>
      <button (click)="switchView('graph')" [disabled]="viewType==='graph'">Graphique</button>
      <button (click)="switchView('table')" [disabled]="viewType==='table'">Tableau</button>
    </div>
  </div>
  <div *ngIf="viewType==='graph'">
    <canvas #lineChartCanvas></canvas>
  </div>
  <table *ngIf="viewType==='table'" class="tableau-ventes">
    <thead>
      <tr>
        <th>Jour</th>
        <th>Ventes</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let jour of jours; let i = index">
        <td>{{ jour }}</td>
        <td>{{ ventes[i] }}</td>
      </tr>
    </tbody>
  </table>
</div>
