<div class="top-produits-card">
  <div class="top-produits-header">
    <h3>Top produits</h3>
    <div class="top-produits-filtres">
      <label for="mois-produits">Mois :</label>
      <select id="mois-produits" [value]="selectedMonth" (change)="onMonthChange($event)">
        <option>Janvier</option>
        <option>Février</option>
        <option>Mars</option>
        <option>Avril</option>
        <option>Mai</option>
        <option>Juin</option>
        <option>Juillet</option>
        <option>Août</option>
        <option>Septembre</option>
        <option>Octobre</option>
        <option>Novembre</option>
        <option>Décembre</option>
      </select>
      <button (click)="switchView('graph')" [disabled]="viewType==='graph'">Graphique</button>
      <button (click)="switchView('table')" [disabled]="viewType==='table'">Tableau</button>
    </div>
  </div>
  <div *ngIf="viewType==='graph'">
    <canvas #barChartCanvas></canvas>
  </div>
  <table *ngIf="viewType==='table'" class="tableau-produits">
    <thead>
      <tr>
        <th>Produit</th>
        <th>Ventes</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of produits">
        <td>{{ p.nom }}</td>
        <td>{{ p.ventes }}</td>
      </tr>
    </tbody>
  </table>
</div>
