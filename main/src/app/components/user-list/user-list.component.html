<h2>Liste des utilisateurs</h2>

<table border="1" cellspacing="0" cellpadding="5">
  <thead>
    <tr>
      <th>Nom complet</th>
      <th>Email</th>
      <th>Role</th>
      <th>Téléphone</th>
      <th>Actif</th>
      <th>Photo</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.fullName }}</td>
      <td>{{ user.email }}</td>
      <td>{{ user.role }}</td>
      <td>{{ user.phone }}</td>
      <td>{{ user.isActive ? 'Oui' : 'Non' }}</td>
      <td>
        <img *ngIf="user.profilePicturePath" [src]="user.profilePicturePath" alt="Profile" width="50">
      </td>
    </tr>
  </tbody>
</table>
